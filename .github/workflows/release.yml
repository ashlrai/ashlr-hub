# release.yml — tag-triggered npm publish + GitHub release (M33).
#
# Trigger: pushing a tag `v<X.Y.Z>`. Nothing publishes without that explicit
# human action, and the verify job re-runs the full CI gate first.
#
# Required repo secret: NPM_TOKEN (npm automation token with publish rights
# for the @ashlr scope). Provenance requires the id-token permission.

name: Release

on:
  push:
    tags: ["v*"]

jobs:
  verify:
    name: Verify (full CI gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm test

  publish:
    name: Publish to npm + GitHub release
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: write   # gh release create
      id-token: write   # npm --provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - name: Tag must match package.json version
        run: node scripts/check-version.mjs
      - name: Extract release notes from CHANGELOG.md
        run: node scripts/extract-changelog.mjs > release-notes.md
      - name: Publish to npm (provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub release
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ github.token }}
