name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ci:
    # Node 22 is the hard minimum — install.sh and CONTRIBUTING.md both enforce it.
    # M83: windows-latest locks in the PR #8 cross-platform work — without a
    # Windows lane the next refactor reintroduces a split('/') or a `which`
    # and nobody notices. Platform-incompatible tests stay skip-guarded with a
    # stated reason (symlinks/EPERM, POSIX mode bits, sandbox-exec, rg/grep).
    name: CI (Node 22, ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test (hermetic)
        # scripts/test-ci.mjs isolates HOME from real ~/.ashlr/ state and adds
        # a watchdog so leaked handles fail loudly instead of hanging the gate.
        # This is the canonical CI invocation documented in CONTRIBUTING.md.
        run: npm run test:ci

      # M33: keep the published exports map honest — pack the tarball, install
      # it into a clean dir, and exercise the bin + the ./types entry point.
      # M83: ubuntu-only — the tarball-exports check is OS-independent, and the
      # bash heredoc (mktemp/$PWD/.bin shims) is not worth porting to Windows.
      - name: Pack smoke (exports map)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          npm pack
          SMOKE_DIR=$(mktemp -d)
          TARBALL="$PWD"/ashlr-hub-*.tgz
          cd "$SMOKE_DIR"
          npm init -y > /dev/null
          npm install $TARBALL > /dev/null
          ./node_modules/.bin/ashlr help > /dev/null
          node -e "import('@ashlr/hub/types').then(() => console.log('exports map ok'))"
          node -e "import('@ashlr/hub/core').then((m) => { if (typeof m.loadConfig !== 'function') throw new Error('core surface broken'); console.log('core surface ok'); })"
